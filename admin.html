<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Админ | Carpenter54</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(circle at 20% 30%, #0a0a1a, #030014);
  min-height:100vh;
  font-family:system-ui,-apple-system,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.glass{
  background:rgba(15,10,35,0.55);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:36px;
  padding:24px;
  width:100%;
  max-width:520px;
}
.back-link{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,0.08);
  padding:6px 14px;
  border-radius:40px;
  font-size:12px;
  color:#aaa;
  text-decoration:none;
  margin-bottom:20px;
}
.back-link:hover{color:#00d4ff}
h1{
  font-size:22px;
  margin-bottom:20px;
  background:linear-gradient(135deg,#00d4ff,#ff006e);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  display:flex;
  align-items:center;
  gap:8px;
}
.login-box input{
  width:100%;
  padding:14px;
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;
  color:#fff;
  font-size:16px;
  margin-bottom:12px;
}
.login-box button{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#00d4ff,#7b2cbf);
  border:none;
  border-radius:20px;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
.dashboard{display:none}
.stats{display:flex;gap:12px;margin-bottom:24px}
.stat-card{
  flex:1;
  background:rgba(255,255,255,0.05);
  border-radius:24px;
  padding:16px;
  text-align:center;
}
.stat-number{
  font-size:32px;
  font-weight:800;
  background:linear-gradient(135deg,#00d4ff,#7b2cbf);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.stat-label{font-size:10px;color:#888;margin-top:4px}
.actions{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.btn{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  padding:8px 16px;
  border-radius:40px;
  color:#eee;
  font-size:12px;
  cursor:pointer;
}
.btn-primary{background:#00d4ff;color:#000}
.btn-danger{background:rgba(255,71,87,0.2);border-color:#ff4757;color:#ff8888}
.section{
  background:rgba(255,255,255,0.04);
  border-radius:24px;
  padding:18px;
  margin-bottom:20px;
}
.section h3{font-size:14px;margin-bottom:14px;color:#00d4ff;display:flex;align-items:center;gap:6px}
.chart-canvas{height:160px}
.messages-list{max-height:300px;overflow-y:auto}
.msg{
  background:rgba(255,255,255,0.03);
  border-radius:16px;
  padding:12px;
  margin-bottom:8px;
}
.msg-name{font-size:13px;font-weight:600;color:#00d4ff}
.msg-contact{font-size:10px;color:#aaa;margin:4px 0}
.msg-text{font-size:12px;margin-top:6px;color:#ddd}
.msg-time{font-size:9px;color:#555;text-align:right;margin-top:8px}
.empty{text-align:center;padding:24px;color:#555}
</style>
</head>
<body>
<div class="glass">
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На сайт</a>

  <div id="loginBox" class="login-box">
    <h1><i class="fas fa-lock"></i> Вход</h1>
    <input type="password" id="adminPass" placeholder="Пароль">
    <button onclick="checkPass()">Войти</button>
    <p style="font-size:11px; color:#555; margin-top:14px; text-align:center">пароль: 2525</p>
  </div>

  <div id="dashboard" class="dashboard">
    <h1><i class="fas fa-chart-simple"></i> Статистика</h1>
    <div class="stats">
      <div class="stat-card"><div class="stat-number" id="totalVisits">0</div><div class="stat-label">Визиты</div></div>
      <div class="stat-card"><div class="stat-number" id="totalMessages">0</div><div class="stat-label">Заявки</div></div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="loadData()"><i class="fas fa-sync"></i> Обновить</button>
      <button class="btn" onclick="exportCSV()"><i class="fas fa-download"></i> CSV</button>
      <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash"></i> Очистить</button>
    </div>
    <div class="section">
      <h3><i class="fas fa-chart-line"></i> Визиты за неделю</h3>
      <div class="chart-canvas"><canvas id="visitsChart"></canvas></div>
    </div>
    <div class="section">
      <h3><i class="fas fa-envelope"></i> Заявки</h3>
      <div id="messagesList" class="messages-list"></div>
    </div>
  </div>
</div>

<script>
const PASS = '2525';
let visits = [], messages = [], chart;

function checkPass() {
  if (document.getElementById('adminPass').value === PASS) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
    initChart();
  } else alert('❌ Неверный пароль');
}

function loadData() {
  visits = JSON.parse(localStorage.getItem('c54_visits') || '[]');
  messages = JSON.parse(localStorage.getItem('c54_messages') || '[]');
  document.getElementById('totalVisits').innerText = visits.length;
  document.getElementById('totalMessages').innerText = messages.length;

  const container = document.getElementById('messagesList');
  if (!messages.length) {
    container.innerHTML = '<div class="empty">📭 Нет заявок</div>';
  } else {
    let html = '';
    messages.slice(0, 30).forEach(m => {
      html += `<div class="msg">
        <div class="msg-name">${escapeHtml(m.name || '-')}</div>
        <div class="msg-contact">${escapeHtml(m.contact || '-')}</div>
        <div class="msg-text">${escapeHtml(m.msg || '-')}</div>
        <div class="msg-time">${m.time || ''}</div>
      </div>`;
    });
    container.innerHTML = html;
  }
  if (chart) updateChart();
}

function initChart() {
  const ctx = document.getElementById('visitsChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: '', data: [], borderColor: '#00d4ff', backgroundColor: 'rgba(0,212,255,0.08)', tension: 0.3, fill: true, pointRadius: 2 }] },
    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
  });
  updateChart();
}

function updateChart() {
  const days = [], counts = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }));
    counts.push(visits.filter(v => new Date(v.time).toDateString() === d.toDateString()).length);
  }
  chart.data.labels = days;
  chart.data.datasets[0].data = counts;
  chart.update();
}

function exportCSV() {
  if (!messages.length) return alert('Нет данных');
  let csv = 'Время,Имя,Контакт,Сообщение\n';
  messages.forEach(m => {
    csv += `"${m.time || ''}","${(m.name || '').replace(/"/g, '""')}","${(m.contact || '').replace(/"/g, '""')}","${(m.msg || '').replace(/"/g, '""')}"\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv' }));
  a.download = `carpenter54_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function clearAll() {
  if (confirm('Удалить все данные?')) {
    localStorage.removeItem('c54_visits');
    localStorage.removeItem('c54_messages');
    localStorage.removeItem('c54_views');
    for (let k in localStorage) if (k.startsWith('c54_vis_')) localStorage.removeItem(k);
    visits = []; messages = [];
    loadData();
    updateChart();
    alert('✅ Очищено');
  }
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}
</script>
</body>
</html>
